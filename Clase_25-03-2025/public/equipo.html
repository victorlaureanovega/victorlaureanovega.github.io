<!DOCTYPE html>
<html>
<head>
    <title>Equipo</title>
</head>
<body>
    <h1>Equipo</h1>

    <script>
        async function obtenerEquipo() {
            //Agregar el url adecuado
            const respuesta = await fetch("/api/equipo");
            const equipo = await respuesta.json(); // Convertir la respuesta en JSON

            // Crear una lista para mostrar los datos
            let ul = document.createElement("ul");

            equipo.forEach(miembro => {
                let li = document.createElement("li");
                li.textContent = `${miembro.nombre}: ${miembro.cualidad}`;
                ul.appendChild(li);
            });

            document.body.appendChild(ul);
        }
        obtenerEquipo();
    </script>
</body>
</html>
