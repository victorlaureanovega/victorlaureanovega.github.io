<!DOCTYPE html>
<html>
<head>
    <title>Escuelas</title>
</head>
<body>
    <h1>Lista de escuelas</h1>
   
    <a href="/">Bienvenida</a>
    <a href="/donantes">Donantes</a>

    <script>
        async function obtenerEscuelas() {
            //Agregar el url adecuado
            const respuesta = await fetch("/api/escuelas");
            const escuelas = await respuesta.json();

            // Crear una lista para mostrar los datos
            let ul = document.createElement("ul");

            escuelas.forEach(escuela => {
                let li = document.createElement("li");
                li.textContent = `${escuela.nombre}: ${escuela.direccion}`;
                ul.appendChild(li);
            });

            document.body.appendChild(ul);
        }
        obtenerEscuelas();
    </script>
</body>
</html>
